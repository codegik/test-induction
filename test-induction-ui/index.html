<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>test-induction · mock manager</title>

    <!-- Well-known modern styling, no build step: Tailwind CSS + Inter font.
         Icons come from lucide-react (bundled). -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: { fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] } } },
      };
    </script>
    <style type="text/tailwindcss">
      @layer components {
        .card   { @apply rounded-2xl border border-slate-800 bg-slate-900/60 shadow-xl shadow-black/30; }
        .btn    { @apply inline-flex items-center gap-2 rounded-lg px-3.5 py-2 text-sm font-medium transition focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-950 disabled:opacity-50; }
        .btn-primary { @apply bg-indigo-500 text-white hover:bg-indigo-400 focus:ring-indigo-500; }
        .btn-ghost   { @apply bg-slate-800/70 text-slate-200 hover:bg-slate-700 focus:ring-slate-600; }
        .btn-danger  { @apply bg-rose-500/10 text-rose-300 ring-1 ring-inset ring-rose-500/30 hover:bg-rose-500/20 focus:ring-rose-500; }
        .label  { @apply block text-xs font-medium uppercase tracking-wide text-slate-400 mb-1.5; }
        .input  { @apply w-full rounded-lg border border-slate-700 bg-slate-950/60 px-3 py-2 text-sm text-slate-100 placeholder-slate-500 transition focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 disabled:cursor-not-allowed disabled:opacity-60; }
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
