services:
  # Single sidecar: mock engine + /__induction control plane + bundled UI,
  # all on port 8080. UI at http://localhost:8080/__induction/ui/
  sidecar:
    build:
      context: ./test-induction-api
    image: test-induction:latest
    ports:
      - "8080:8080"
    volumes:
      - induction-data:/data

  sample-app:
    build:
      context: ./sample-app
    image: sample-app:latest
    ports:
      - "9090:9090"
    environment:
      INDUCTION_SIDECARHOST: sidecar
      INDUCTION_SIDECARPORT: "8080"
    depends_on:
      sidecar:
        condition: service_healthy

volumes:
  induction-data:
